<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>welch-fun</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #111;
      min-height: 100vh;
    }
    #page {
      max-width: 780px;
      margin: 0 auto;
      padding: 56px 24px 80px;
    }
    #header {
      text-align: center;
      margin-bottom: 56px;
    }
    #logo {
      display: inline-flex;
      align-items: center;
      gap: 14px;
    }
    #logo-badge {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: #d42b2b;
      transform: rotate(-8deg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #logo-badge span {
      transform: rotate(8deg);
      color: #fff;
      font-size: 26px;
      font-weight: 800;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #logo h1 {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -1.5px;
      color: #111;
    }
    #logo h1 span {
      color: #d42b2b;
    }
    #header p {
      font-size: 15px;
      color: #999;
      margin-top: 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 16px;
    }
    .card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 18px;
      padding: 30px 20px 24px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 13px;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      color: inherit;
    }
    .card:hover {
      border-color: #c8c8c8;
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.07);
    }
    .card:active { transform: translateY(-1px); }
    .icon {
      width: 68px; height: 68px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #111;
      text-align: center;
    }
    .card-desc {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      line-height: 1.5;
    }
    #footer {
      text-align: center;
      margin-top: 64px;
      font-size: 12px;
      color: #ccc;
      letter-spacing: 0.3px;
    }

    @media (max-width: 480px) {
      #logo h1 { font-size: 30px; }
      #logo-badge { width: 40px; height: 40px; border-radius: 10px; }
      #logo-badge span { font-size: 21px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    }
  </style>
</head>
<body>
  <div id="page">

    <div id="header">
      <div id="logo">
        <div id="logo-badge"><span>w</span></div>
        <h1>welch<span>fun</span></h1>
      </div>
      <p>A growing collection of little things to click, press, and play with.</p>
    </div>

    <div class="grid">

      <!-- RED BUTTON -->
      <a class="card" href="red-button.html">
        <div class="icon" style="background:#fff0f0; border: 2px solid #ffd0d0;">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="18" cy="18" r="15" fill="#c02020"/>
            <circle cx="18" cy="18" r="13" fill="#d42b2b"/>
            <circle cx="18" cy="18" r="11" fill="#e03535"/>
            <ellipse cx="13" cy="12" rx="5" ry="3.2" fill="rgba(255,185,185,0.55)"/>
            <circle cx="18" cy="18" r="10.5" fill="none" stroke="rgba(90,0,0,0.18)" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="card-title">Red button</div>
        <div class="card-desc">Press it. You know you want to.</div>
      </a>

      <!--
        TO ADD A NEW APP, copy one of the <a class="card"> blocks above,
        change the href to your new file (e.g. href="snake-game.html"),
        update the icon SVG, title, and description.

        DON'T FORGET: paste the "Home" button snippet into the new app's
        HTML file so users can navigate back here.
      -->

    </div>

    <div id="footer">made with curiosity &amp; claude</div>

  </div>
</body>
</html>
